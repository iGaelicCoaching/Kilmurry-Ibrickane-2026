let AF='All',AP=null,CH={};
function gp(){return PLAYERS.filter(p=>AF==='All'||p.position===AF);}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function dc(pos){return pos==='Goalkeeper'?'gk':pos==='Inside 3 Defenders'?'def':pos==='Middle 8'?'mid':'fwd';}
function ptc(pos){return pos.replace(/\s/g,'').replace('3','3');}
function dch(){Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};}

function buildSB(){
  document.getElementById('plist').innerHTML=gp().map(p=>`<div class="pi${AP&&AP.name===p.name?' active':''}" onclick="selP('${p.name}')"><span class="dot ${dc(p.position)}"></span><span class="pn">${p.name}</span><span class="pg">${p.games}g</span></div>`).join('');
  document.getElementById('sqct').textContent=PLAYERS.length+' players';
}
function filterPos(pos,btn){AF=pos;document.querySelectorAll('.pfb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildSB();}
function selP(name){AP=PLAYERS.find(p=>p.name===name);document.getElementById('nav-sq').classList.remove('active');buildSB();renderPlayer();}
function showSquad(){AP=null;document.getElementById('nav-sq').classList.add('active');buildSB();renderSquad();}

function renderSquad(){
  dch();
  const po=['Goalkeeper','Inside 3 Defenders','Middle 8','Inside 3 Forwards'];
  const bp={};PLAYERS.forEach(p=>{(bp[p.position]||(bp[p.position]=[])).push(p);});
  let rows='';
  po.forEach(pos=>{if(!bp[pos])return;bp[pos].forEach(p=>{
    const m=p.match,td=m.tpg-SAVG.tkl,nd=m.npg-SAVG.nto;
    const tc2=td>=0.2?'#16a34a':td<=-0.2?'#dc2626':'#ca8a04';
    const nc2=nd<=-0.2?'#16a34a':nd>=0.2?'#dc2626':'#ca8a04';

function renderPlayer(){

  const rp=rg?`<span class="pill" style="background:${rg.bg};color:${rg.tc};border-color:${rg.bg};">1.2km ${s.run_time} — <strong>${rg.l}</strong></span>`:'';

function swTab(t,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');swTabRender(t);}

function shotGrade(e){if(e===null||e===undefined)return null;if(e>=1.10)return{l:'Inter County',bg:'#14532d',tc:'#fff'};if(e>=1.00)return{l:'Senior',bg:'#16a34a',tc:'#fff'};if(e>=0.85)return{l:'Intermediate',bg:'#ca8a04',tc:'#fff'};if(e>=0.75)return{l:'Junior',bg:'#ea580c',tc:'#fff'};if(e>=0.50)return{l:'Junior B',bg:'#dc2626',tc:'#fff'};return{l:'Below',bg:'#6b7280',tc:'#fff'};}

function tMatch(p,tb){

    if(!md&&!sd) return '';
    const t=md?md.t:'—',n=md?md.n:'—',ok=md?md.ok:'—',pk=md?md.pk:'—',gf=md?md.gf:'—';
    const nColor=md?(md.n>=3?'#dc2626':md.n>=2?'#ca8a04':'inherit'):'inherit';
    let shotCell='—';
    if(sd){
      const pts=sd.pt_sc>0||sd.pt_att>0?`<span style="color:#15803d;font-weight:600;">${sd.pt_sc}/${sd.pt_att}</span>`:null;
      const tw=sd.tw_att>0?`<span style="color:#14532d;font-weight:600;">${sd.tw_sc}/${sd.tw_att}</span>`:null;
      const ga=sd.ga_att>0?`<span style="color:#991b1b;font-weight:600;">${sd.ga_sc}/${sd.ga_att}g</span>`:null;
      const parts=[pts,tw,ga].filter(Boolean).join(' · ');
      const sg=shotGrade(sd.eff);
      const effBadge=sg?`<span style="background:${sg.bg};color:${sg.tc};padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin-left:4px;">${sd.eff.toFixed(2)}</span>`:'';
      shotCell=`${parts}${effBadge}`;
    }
    return `<tr>
      <td><strong>v ${opp}</strong></td>
      <td>${t}</td>
      <td style="color:${nColor};font-weight:${md&&md.n>=2?'700':'400'};">${n}</td>
      <td>${ok}</td><td>${pk}</td><td>${gf}</td><td>${sf}</td>
      <td>${shotCell}</td>
    </tr>`;

  tb.innerHTML=`

      <div class="card met"><div class="v">${m.opp_ko}</div><div class="l">Opp. Kickouts</div></div>

        <span>Eff badge: scored ÷ xScore</span>

function tShoot(p,tb){
  dch();
  const sd=SD[p.name];
  if(!sd||sd.total===0){tb.innerHTML='<div class="emp"><div style="font-size:36px;margin-bottom:12px;">🎯</div><div>No shot data recorded.</div></div>';return;}
  const ptC=sd.pt_att>0?Math.round(sd.pt_scored/sd.pt_att*100):null;
  const twC=sd.tw_att>0?Math.round(sd.tw_scored/sd.tw_att*100):null;
  const gaC=sd.ga_att>0?Math.round(sd.ga_scored/sd.ga_att*100):null;
  const ecolor=ec(sd.eff),elabel=el(sd.eff);
  const pgRows=sd.per_game.map(g=>`<tr><td><strong>v ${g.opp}</strong></td><td>${g.pt_att>0?g.pt_scored+'/'+g.pt_att:'—'}</td><td>${g.tw_att>0?g.tw_scored+'/'+g.tw_att:'—'}</td><td>${g.ga_att>0?g.ga_scored+'/'+g.ga_att:'—'}</td><td><strong>${g.total}</strong></td><td><strong>${g.actual}</strong> pts</td><td style="color:var(--light);font-size:12px;">${g.xScore}</td><td><span style="font-weight:700;color:${ec(g.eff)};">${g.eff.toFixed(2)}</span></td></tr>`).join('');
  tb.innerHTML=`
    <div class="g g4" style="margin-bottom:13px;">
      <div class="card met"><div class="v">${sd.total}</div><div class="l">Total Shots</div></div>
      <div class="card met"><div class="v">${sd.actual}<span style="font-size:13px;color:var(--muted);"> pts</span></div><div class="l">Points Scored</div></div>
      <div class="card met"><div class="v" style="font-size:18px;color:var(--muted);">${sd.xScore}</div><div class="l">Expected Score</div></div>
      <div class="card met"><div class="v" style="color:${ecolor};">${sd.eff.toFixed(2)}</div><div class="l">Efficiency vs 1.0</div><div style="font-size:10px;color:${ecolor};font-weight:700;margin-top:2px;">${elabel}</div></div>
    </div>
    <div class="g g3" style="margin-bottom:13px;">
      <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><div class="ct" style="margin:0;">1 Point Attempts</div>${sd.pt_att>0?`<span style="font-size:17px;font-weight:700;color:#15803d;">${sd.pt_scored}/${sd.pt_att}</span>`:'<span style="color:var(--light);">—</span>'}</div>
        ${sd.pt_att>0?`<div style="height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:6px;"><div style="height:100%;width:${ptC}%;background:#16a34a;border-radius:4px;"></div></div><div style="font-size:13px;font-weight:700;color:#16a34a;margin-bottom:7px;">${ptC}% conv</div><div>${opills(sd.pt_out)}</div>`:'<div style="color:var(--light);font-size:13px;">No 1pt attempts</div>'}
      </div>
      <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><div class="ct" style="margin:0;">2 Point Attempts</div>${sd.tw_att>0?`<span style="font-size:17px;font-weight:700;color:#14532d;">${sd.tw_scored}/${sd.tw_att}</span>`:'<span style="color:var(--light);">—</span>'}</div>
        ${sd.tw_att>0?`<div style="height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:6px;"><div style="height:100%;width:${twC}%;background:#15803d;border-radius:4px;"></div></div><div style="font-size:13px;font-weight:700;color:#15803d;margin-bottom:7px;">${twC}% conv</div><div>${opills(sd.tw_out)}</div>`:'<div style="color:var(--light);font-size:13px;">No 2pt attempts</div>'}
      </div>
      <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;"><div class="ct" style="margin:0;">Goal Attempts</div>${sd.ga_att>0?`<span style="font-size:17px;font-weight:700;color:#991b1b;">${sd.ga_scored}/${sd.ga_att}</span>`:'<span style="color:var(--light);">—</span>'}</div>
        ${sd.ga_att>0?`<div style="height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:6px;"><div style="height:100%;width:${gaC||0}%;background:#dc2626;border-radius:4px;"></div></div><div style="font-size:13px;font-weight:700;color:#dc2626;margin-bottom:7px;">${gaC||0}% conv</div><div>${opills(sd.ga_out)}</div>`:'<div style="color:var(--light);font-size:13px;">No goal attempts</div>'}
      </div>
    </div>
    <div class="g g2" style="margin-bottom:13px;">
      <div class="card"><div class="ct">Efficiency vs 1.0 Baseline</div>
        <div style="display:flex;align-items:center;gap:13px;padding:5px 0;">
          <div style="flex:1;"><div style="height:13px;background:var(--bg);border-radius:7px;position:relative;overflow:visible;"><div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(sd.eff/2*100,100)}%;background:${ecolor};border-radius:7px;overflow:hidden;"></div><div style="position:absolute;left:50%;top:-3px;width:2px;height:19px;background:#9ca3af;border-radius:1px;"></div></div><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--light);margin-top:4px;"><span>0</span><span>1.0 avg</span><span>2.0</span></div></div>
          <div style="text-align:center;min-width:58px;"><div style="font-size:24px;font-weight:700;color:${ecolor};">${sd.eff.toFixed(2)}</div><div style="font-size:10px;color:var(--light);">${sd.eff>=1.0?'Outperforming':'Underperforming'}</div></div>
        </div>
        <div style="font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:9px;padding-top:7px;">Actual <strong>${sd.actual}pts</strong> · Expected <strong>${sd.xScore}pts</strong></div>
      </div>
      <div class="card"><div class="ct">Shot Mix</div><div class="cw" style="height:150px;"><canvas id="ch-mix" role="img" aria-label="Shot type mix"></canvas></div></div>
    </div>
    <div class="card"><div class="ct">Game by Game</div><div style="overflow-x:auto;"><table class="tbl"><thead><tr><th>Opponent</th><th>1pt (sc/att)</th><th>2pt (sc/att)</th><th>Goal (sc/att)</th><th>Shots</th><th>Actual</th><th>xScore</th><th>Efficiency</th></tr></thead><tbody>${pgRows}</tbody></table></div></div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('ch-mix');
    if(!ctx)return;
    const vd=[{v:sd.pt_att,l:'1pt Attempt',c:'#16a34a'},{v:sd.tw_att,l:'2pt Attempt',c:'#14532d'},{v:sd.ga_att,l:'Goal Attempt',c:'#dc2626'}].filter(x=>x.v>0);
    CH['mix']=new Chart(ctx,{type:'doughnut',data:{labels:vd.map(x=>x.l),datasets:[{data:vd.map(x=>x.v),backgroundColor:vd.map(x=>x.c),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{font:{size:11},boxWidth:12}}}}});
  },80);
}

function tSC(p,tb){
  const s=p.sc;
  const cb=Math.max(s.cmj1||0,s.cmj2||0)||null,sb=Math.max(s.sj1||0,s.sj2||0)||null;
  const rg=rGrade(s.run_secs,p.position);
  tb.innerHTML=`
    <div class="g g3" style="margin-bottom:13px;">
      <div class="card met"><div class="v">${s.weight||'—'}<span style="font-size:13px;color:var(--muted);"> kg</span></div><div class="l">Body Weight</div></div>
      <div class="card met">${s.run_secs?(()=>{return rg?`<div style="background:${rg.bg};color:${rg.tc};border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;margin-bottom:4px;display:inline-block;">${rg.l}</div><div class="v" style="font-size:18px;">${s.run_time}</div>`:'<div class="v">—</div>';})():'<div class="v" style="font-size:18px;">—</div>'}<div class="l">1.2km Run</div></div>
      <div class="card met"><div class="v">${s.chin2||s.chin1||'—'}</div><div class="l">Chin Ups (best)</div></div>
    </div>
    <div class="g g2" style="margin-bottom:13px;">
      <div class="card"><div class="ct">Jump Tests (cm)</div><div class="cw" style="height:195px;"><canvas id="ch-jmp" role="img" aria-label="Jump tests"></canvas></div></div>
      <div class="card"><div class="ct">Broad Jump (cm)</div>
        ${s.broad1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.broad1}cm</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.broad1/320*100,100)}%;background:var(--blue);height:100%;"></div></div></div>`:''}
        ${s.broad2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.broad2}cm</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.broad2/320*100,100)}%;background:var(--green2);height:100%;"></div></div></div>`:''}
        ${s.broad1&&s.broad2?`<div style="font-size:12px;color:var(--muted);margin-top:5px;">Change: <strong style="color:${s.broad2>s.broad1?'#16a34a':'#dc2626'}">${s.broad2>s.broad1?'+':''}${s.broad2-s.broad1}cm</strong></div>`:''}
        <div class="ct" style="margin-top:13px;">SLCMJ</div>
        ${s.slcmj1?`<div style="font-size:13px;margin-bottom:3px;">Test 1: <strong>${s.slcmj1}</strong></div>`:''}
        ${s.slcmj2?`<div style="font-size:13px;">Test 2: <strong>${s.slcmj2}</strong></div>`:''}
        ${!s.slcmj1&&!s.slcmj2?'<div style="color:var(--light);font-size:13px;">No data</div>':''}
      </div>
    </div>
    <div class="g g2">
      <div class="card"><div class="ct">Bench Press</div>
        ${s.bench1||s.bench2?`${s.bench1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.bench1}kg</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.bench1/150*100,100)}%;background:var(--blue);height:100%;"></div></div></div>`:''} ${s.bench2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.bench2}kg</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.bench2/150*100,100)}%;background:var(--green2);height:100%;"></div></div></div>`:''}<div style="font-size:13px;margin-top:5px;">BW Ratio: <strong class="${s.bbw>=1.3?'sg':'sw'}">${s.bbw||'—'}</strong><span style="color:var(--light);font-size:11px;"> target 1.3× = ${s.btgt}kg</span></div>`:'<div class="emp" style="padding:18px;">No data</div>'}
      </div>
      <div class="card"><div class="ct">Front Squat</div>
        ${s.squat1||s.squat2?`${s.squat1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.squat1}kg</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.squat1/180*100,100)}%;background:var(--blue);height:100%;"></div></div></div>`:''} ${s.squat2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.squat2}kg</strong></div><div class="pt" style="height:8px;"><div class="pf2" style="width:${Math.min(s.squat2/180*100,100)}%;background:var(--green2);height:100%;"></div></div></div>`:''}<div style="font-size:13px;margin-top:5px;">BW Ratio: <strong class="${s.sbw>=1.5?'sg':'sw'}">${s.sbw||'—'}</strong><span style="color:var(--light);font-size:11px;"> target 1.5× = ${s.stgt}kg</span></div>`:'<div class="emp" style="padding:18px;">No data</div>'}
      </div>
    </div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-jmp');if(ctx){CH['jmp']=new Chart(ctx,{type:'bar',data:{labels:['CMJ','SJ'],datasets:[{label:'Test 1',data:[s.cmj1||0,s.sj1||0],backgroundColor:'#2563eb',borderRadius:4},{label:'Test 2',data:[s.cmj2||0,s.sj2||0],backgroundColor:'#16a34a',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:65,title:{display:true,text:'cm'}}},plugins:{legend:{position:'bottom'}}}});}},80);
}

function tBench(p,tb){
  const s=p.sc,k=pk(p.position),rg=rGrade(s.run_secs,p.position);
  const gt=p.position==='Middle 8'?RMID:R3UP;
  const gRows=gt.map(g=>{
    const isc=rg&&rg.l===g.l;
    const mn=g.mn===0?'Best':`${Math.floor(g.mn/60)}:${String(g.mn%60).padStart(2,'0')}`;
    const mx=g.mx===9999?'—':`${Math.floor(g.mx/60)}:${String(g.mx%60).padStart(2,'0')}`;
    return `<tr style="${isc?`font-weight:700;`:''}"><td><span style="background:${g.bg};color:${g.tc};padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;">${g.l}</span></td><td>${mn}</td><td>${mx}</td><td>${isc?`<strong style="color:${g.bg};">← ${s.run_time}</strong>`:''}</td></tr>`;
  }).join('');
  const cb=Math.max(s.cmj1||0,s.cmj2||0)||null,sj=Math.max(s.sj1||0,s.sj2||0)||null;
  const bj=Math.max(s.broad1||0,s.broad2||0)||null,ch=Math.max(s.chin1||0,s.chin2||0)||null;
  const metrics=[{l:'CMJ (cm)',v:cb,t:BM['cmj_'+k]},{l:'SJ (cm)',v:sj,t:BM['sj_'+k]},{l:'Broad Jump (cm)',v:bj,t:BM['broad_'+k]},{l:'Chin Ups',v:ch,t:BM['chin_'+k]},{l:'Bench/BW',v:s.bbw,t:1.3},{l:'Squat/BW',v:s.sbw,t:1.5}];
  const met=metrics.filter(m=>m.v&&m.v>=m.t).length,tested=metrics.filter(m=>m.v).length;
  const mRows=metrics.map(m=>{const ok=m.v&&m.v>=m.t;const col=ok?'#16a34a':m.v?'#ca8a04':'#9ca3af';const pct=m.v?Math.min(m.v/m.t*100,130):0;
    return `<div style="margin-bottom:12px;"><div style="display:flex;align-items:center;gap:7px;"><span style="font-size:12px;color:var(--muted);width:120px;">${m.l}</span><div style="flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;position:relative;"><div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(pct,100)}%;background:${col};border-radius:4px;"></div></div><span style="font-size:12px;font-weight:700;width:38px;text-align:right;color:${col};">${m.v||'—'}</span><span style="font-size:11px;color:var(--light);width:40px;text-align:right;">/ ${m.t}</span><span style="font-size:11px;width:56px;text-align:right;">${m.v?(ok?'<span class="sg">✓ Met</span>':'<span class="sw">Below</span>'):'<span class="sn">—</span>'}</span></div></div>`;
  }).join('');
  // Shooting efficiency grade
  const sd=SD[p.name];
  const SHOT_GRADES=[{l:'Inter County',mn:1.10,mx:1.50,bg:'#14532d',tc:'#fff'},{l:'Senior',mn:1.00,mx:1.09,bg:'#16a34a',tc:'#fff'},{l:'Intermediate',mn:0.85,mx:0.99,bg:'#ca8a04',tc:'#fff'},{l:'Junior',mn:0.75,mx:0.84,bg:'#ea580c',tc:'#fff'},{l:'Junior B',mn:0.50,mx:0.74,bg:'#dc2626',tc:'#fff'}];
  const sg=sd?SHOT_GRADES.find(g=>sd.eff>=g.mn&&sd.eff<=g.mx):null;
  const sgRows=SHOT_GRADES.map(g=>{
    const isc=sg&&sg.l===g.l;
    return `<tr style="${isc?'font-weight:700;':''}"><td><span style="background:${g.bg};color:${g.tc};padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;">${g.l}</span></td><td>${g.mn.toFixed(2)}</td><td>${g.mx.toFixed(2)}</td><td>${isc?`<strong style="color:${g.bg};">← ${sd.eff.toFixed(2)}</strong>`:''}</td></tr>`;
  }).join('');
  tb.innerHTML=`
    <div class="sh2">Shooting Efficiency — Level Classification</div>
    <div class="g g2" style="margin-bottom:14px;">
      <div class="card"><table class="tbl"><thead><tr><th>Level</th><th>From</th><th>To</th><th>Player</th></tr></thead><tbody>${sgRows}</tbody></table>${!sd?'<div style="margin-top:9px;font-size:12px;color:var(--light);">No shooting data recorded</div>':''}</div>
      <div class="card"><div class="ct">Current Shooting Grade</div>
        ${sg?`<div style="background:${sg.bg};color:${sg.tc};border-radius:9px;padding:16px;text-align:center;margin-bottom:11px;"><div style="font-size:26px;font-weight:700;">${sg.l}</div><div style="font-size:14px;margin-top:3px;opacity:.85;">Eff ${sd.eff.toFixed(2)} · ${sd.actual}pts from ${sd.total} shots</div></div><div style="font-size:12px;color:var(--muted);">xScore: <strong>${sd.xScore}</strong> · Actual: <strong>${sd.actual}pts</strong></div>`
        :sd?`<div style="color:var(--light);font-size:13px;padding:14px 0;">Efficiency ${sd.eff.toFixed(2)} — outside graded range</div>`
        :'<div style="color:var(--light);font-size:13px;padding:18px 0;text-align:center;">No shooting data recorded</div>'}
      </div>
    </div>
    <div class="sh2">1.2km Run — Level Classification (${p.position==='Middle 8'?'Middle 3rd':'3 Up/Back'})</div>
    <div class="g g2" style="margin-bottom:14px;">
      <div class="card"><table class="tbl"><thead><tr><th>Level</th><th>From</th><th>To</th><th>Player</th></tr></thead><tbody>${gRows}</tbody></table>${!s.run_secs?'<div style="margin-top:9px;font-size:12px;color:var(--light);">No run time recorded</div>':''}</div>
      <div class="card"><div class="ct">Current Grade</div>${rg?`<div style="background:${rg.bg};color:${rg.tc};border-radius:9px;padding:16px;text-align:center;margin-bottom:11px;"><div style="font-size:26px;font-weight:700;">${rg.l}</div><div style="font-size:13px;margin-top:3px;opacity:.85;">${s.run_time} · ${p.position}</div></div><div style="font-size:12px;color:var(--muted);">Group: <strong>${p.position==='Middle 8'?'Middle 3rd':'3 Up/Back'}</strong></div>`:'<div style="color:var(--light);font-size:13px;padding:18px 0;text-align:center;">No run time recorded</div>'}</div>
    </div>
    <div class="sh2">S&amp;C Benchmarks</div>
    <div class="g g3" style="margin-bottom:13px;">
      <div class="card met"><div class="v" style="color:#16a34a;">${met}</div><div class="l">Benchmarks Met</div></div>
      <div class="card met"><div class="v" style="color:#ca8a04;">${tested-met}</div><div class="l">Below Target</div></div>
      <div class="card met"><div class="v" style="color:var(--light);">${6-tested}</div><div class="l">Not Tested</div></div>
    </div>
    <div class="g g2">
      <div class="card"><div class="ct">${p.position} — vs Target</div>${mRows}</div>
      <div class="card"><div class="ct">Radar — vs Position Standard</div><div class="cw" style="height:255px;"><canvas id="ch-rad" role="img" aria-label="Radar chart"></canvas></div></div>
    </div>`;
  setTimeout(()=>{const ctx=document.getElementById('ch-rad');if(ctx){CH['rad']=new Chart(ctx,{type:'radar',data:{labels:['CMJ','SJ','Broad Jump','Chin Ups','Bench/BW','Squat/BW'],datasets:[{label:'Player',data:[cb?Math.round(cb/BM['cmj_'+k]*100):0,sj?Math.round(sj/BM['sj_'+k]*100):0,bj?Math.round(bj/BM['broad_'+k]*100):0,ch?Math.round(ch/BM['chin_'+k]*100):0,s.bbw?Math.round(s.bbw/1.3*100):0,s.sbw?Math.round(s.sbw/1.5*100):0],fill:true,backgroundColor:'rgba(22,163,74,.15)',borderColor:'#16a34a',pointRadius:4,pointBackgroundColor:'#16a34a'},{label:'Standard',data:[100,100,100,100,100,100],fill:false,borderColor:'#ca8a04',borderDash:[5,5],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:130,ticks:{display:false},pointLabels:{font:{size:11}}}},plugins:{legend:{display:true,position:'bottom'}}}});}},80);
}

function tUpdate(p,tb){
  const s=p.sc;
  tb.innerHTML=`
    <div class="card" style="margin-bottom:11px;"><div class="ct">Update S&amp;C Data</div>
      <div class="fg2">
        <div class="fi"><label>Weight (kg)</label><input type="number" placeholder="${s.weight||''}"></div>
        <div class="fi"><label>1.2km Run (mm:ss)</label><input type="text" placeholder="${s.run_time||''}"></div>
        <div class="fi"><label>CMJ (cm)</label><input type="number" placeholder="${s.cmj2||s.cmj1||''}"></div>
        <div class="fi"><label>SJ (cm)</label><input type="number" placeholder="${s.sj2||s.sj1||''}"></div>
        <div class="fi"><label>SLCMJ</label><input type="text" placeholder="${s.slcmj2||s.slcmj1||'e.g. L20/R21'}"></div>
        <div class="fi"><label>Broad Jump (cm)</label><input type="number" placeholder="${s.broad2||s.broad1||''}"></div>
        <div class="fi"><label>Chin Ups</label><input type="number" placeholder="${s.chin2||s.chin1||''}"></div>
        <div class="fi"><label>Bench Press (kg)</label><input type="number" placeholder="${s.bench2||s.bench1||''}"></div>
        <div class="fi"><label>Front Squat (kg)</label><input type="number" placeholder="${s.squat2||s.squat1||''}"></div>
      </div>
      <div style="margin-top:11px;"><button class="btn btng" onclick="alert('Saved ✓')">Save S&amp;C Data</button></div>
    </div>
    <div class="card"><div class="ct">Add Match Stats</div>
      <div class="fg2">
        <div class="fi"><label>Opponent</label><input type="text" placeholder="e.g. Lisdoonvarna"></div>
        <div class="fi"><label>Tackles</label><input type="number" placeholder="0"></div>
        <div class="fi"><label>Neg. Turnovers</label><input type="number" placeholder="0"></div>
        <div class="fi"><label>Own Kickouts</label><input type="number" placeholder="0"></div>
        <div class="fi"><label>Opp. Kickouts Won</label><input type="number" placeholder="0"></div>
        <div class="fi"><label>General Frees</label><input type="number" placeholder="0"></div>
      </div>
      <div style="margin-top:11px;"><button class="btn btng" onclick="alert('Match added ✓')">Add Match</button></div>
    </div>`;
}
buildSB();showSquad();
</script>
</body>
</html>
