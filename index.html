<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KIB Dashboard 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --g:#1a5c38;--g2:#2d8a52;--gl:#e5f2ea;--gp:#f0f8f3;
  --red:#dc2626;--amber:#ca8a04;--blue:#2471a3;--orange:#ea580c;
  --bg:#f2f4f6;--card:#fff;--bdr:#e2e5ea;
  --txt:#1a1e21;--muted:#5f6b7a;--light:#9aa3ae;
  --hh:56px;--bnh:60px;--r:12px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;}
/* ── HEADER ── */
.hdr{height:var(--hh);background:var(--g);color:#fff;display:flex;align-items:center;padding:0 16px;gap:11px;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.crest{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--g);flex-shrink:0;}
.ht{font-size:14px;font-weight:700;line-height:1.2;}
.hs{font-size:10px;opacity:.7;}
.hbk{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:none;}
.hbk.show{display:block;}
/* ── SCREENS ── */
.screen{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--bnh);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:12px;}
.screen.active{display:block;}
/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bnh);background:var(--card);border-top:1px solid var(--bdr);display:flex;z-index:200;box-shadow:0 -1px 6px rgba(0,0,0,.08);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--light);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:6px 2px;transition:color .15s;}
.bni.active{color:var(--g);}
.bni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
/* ── SQUAD LIST ── */
.sq-search{background:var(--card);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;}
.sq-search input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--txt);}
.pf-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none;}
.pf-bar::-webkit-scrollbar{display:none;}
.pfb{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.pfb.active{background:var(--g);color:#fff;border-color:var(--g);}
.p-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-user-select:none;user-select:none;}
.p-card:active{background:var(--gp);}
.av{width:42px;height:42px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.p-info{flex:1;min-width:0;}
.p-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-pos{font-size:11px;color:var(--muted);margin-top:1px;}
.p-right{text-align:right;flex-shrink:0;}
.p-eff{font-size:16px;font-weight:700;}
.p-effl{font-size:10px;color:var(--muted);}
.pos-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);padding:4px 4px 6px;margin-top:6px;}
/* ── PLAYER PROFILE ── */
.p-hdr{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:#fff;border-radius:var(--r);padding:16px;margin-bottom:11px;box-shadow:var(--sh);}
.p-hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.av-lg{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.p-hdr h2{font-size:19px;font-weight:700;line-height:1.1;}
.p-hdr-pos{font-size:11px;opacity:.8;margin-top:2px;}
.p-pills{display:flex;gap:6px;flex-wrap:wrap;}
.ppill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:3px 10px;font-size:11px;color:#fff;}
/* ── TAB SCROLLER ── */
.tab-bar{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:var(--r);padding:4px;box-shadow:var(--sh);overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:7px 13px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-radius:8px;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.tab.active{background:var(--g);color:#fff;}
/* ── CARDS & GRIDS ── */
.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:11px;}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);margin-bottom:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:11px;}
.met{background:var(--card);border-radius:var(--r);padding:12px 8px;box-shadow:var(--sh);text-align:center;}
.met .v{font-size:24px;font-weight:700;line-height:1.1;}
.met .l{font-size:10px;color:var(--muted);margin-top:3px;}
/* ── BIG STAT ROW ── */
.stat-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{font-size:13px;color:var(--muted);flex:1;}
.stat-val{font-size:18px;font-weight:700;margin-right:8px;}
.stat-diff{font-size:12px;font-weight:700;padding:2px 7px;border-radius:10px;}
/* ── PROGRESS BAR ── */
.pr{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.pl{font-size:12px;color:var(--muted);width:90px;flex-shrink:0;}
.pt{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.pf2{height:100%;border-radius:4px;}
.pv{font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0;}
.ptg{font-size:11px;color:var(--light);width:38px;text-align:right;flex-shrink:0;}
/* ── GAME ROWS ── */
.gr{padding:11px 0;border-bottom:1px solid var(--bdr);}
.gr:last-child{border-bottom:none;}
.gr-opp{font-size:13px;font-weight:700;margin-bottom:5px;}
.gr-stats{display:flex;gap:8px;flex-wrap:wrap;}
.gs{background:var(--bg);border-radius:8px;padding:4px 9px;font-size:12px;color:var(--muted);}
.gs strong{color:var(--txt);}
/* ── BENCH TABLE ── */
.br{margin-bottom:10px;}
.bh{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;}
/* ── GRADE CARDS ── */
.grade-card{border-radius:var(--r);padding:14px;text-align:center;margin-bottom:11px;}
.grade-big{font-size:28px;font-weight:800;line-height:1.1;}
.grade-sub{font-size:13px;opacity:.85;margin-top:4px;}
/* ── GRADE TABLE ── */
.gtbl{width:100%;border-collapse:collapse;font-size:13px;}
.gtbl td{padding:8px 10px;border-bottom:1px solid var(--bdr);}
.gtbl tr:last-child td{border-bottom:none;}
.gbadge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;}
/* ── OUTCOME PILLS ── */
.op{display:inline-block;padding:2px 8px;border-radius:9px;font-size:11px;font-weight:600;margin:2px;}
/* ── SHOT EFF GAUGE ── */
.gauge-wrap{position:relative;height:14px;background:var(--bg);border-radius:7px;overflow:visible;margin-bottom:5px;}
.gauge-fill{position:absolute;left:0;top:0;height:100%;border-radius:7px;overflow:hidden;}
.gauge-mid{position:absolute;left:50%;top:-3px;width:2px;height:20px;background:#9ca3af;border-radius:1px;}
/* ── FORM ── */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.fi{display:flex;flex-direction:column;gap:4px;}
.fi label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.fi input{padding:9px 11px;border:1.5px solid var(--bdr);border-radius:8px;font-size:14px;background:var(--card);color:var(--txt);}
.fi input:focus{outline:none;border-color:var(--g);}
.btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:700;}
.btng{background:var(--g);color:#fff;margin-bottom:8px;}
/* ── SECTION HEADER ── */
.sh2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);margin:14px 0 8px;}
.cw{width:100%;position:relative;}
/* ── SQUAD OVERVIEW CARDS ── */
.sq-stat-card{background:var(--card);border-radius:var(--r);padding:13px;box-shadow:var(--sh);margin-bottom:8px;}
.sq-stat-card .name{font-size:14px;font-weight:700;margin-bottom:6px;}
.sq-mini-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.sqmg{background:var(--bg);border-radius:8px;padding:7px;text-align:center;}
.sqmg .sv{font-size:16px;font-weight:700;line-height:1;}
.sqmg .sl{font-size:9px;color:var(--light);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
/* dot colours */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.dot.gk{background:#7c3aed;}.dot.def{background:#2563eb;}.dot.mid{background:#1a5c38;}.dot.fwd{background:#dc2626;}
</style>
</head>

</div>

  let html=`<div class="sq-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="sq-inp" placeholder="Search players…" oninput="filterSearch(this.value)"></div>
  <div class="pf-bar">
    <button class="pfb ${AF==='All'?'active':''}" onclick="setFilter('All',this)">All</button>
    <button class="pfb ${AF==='Goalkeeper'?'active':''}" onclick="setFilter('Goalkeeper',this)">GK</button>
    <button class="pfb ${AF==='Inside 3 Defenders'?'active':''}" onclick="setFilter('Inside 3 Defenders',this)">Defenders</button>
    <button class="pfb ${AF==='Middle 8'?'active':''}" onclick="setFilter('Middle 8',this)">Middle 8</button>
    <button class="pfb ${AF==='Inside 3 Forwards'?'active':''}" onclick="setFilter('Inside 3 Forwards',this)">Forwards</button>
  </div>`;
  pos.forEach(p=>{
    const pl=(bp[p]||[]).filter(x=>!filt||x.position===filt);
    if(!pl.length) return;
    const label={Goalkeeper:'Goalkeepers','Inside 3 Defenders':'Inside 3 Defenders','Middle 8':'Middle 8','Inside 3 Forwards':'Inside 3 Forwards'}[p];
    html+=`<div class="pos-section"><span class="dot ${dc(p)}"></span>${label}</div>`;
    pl.forEach(player=>{
      const sd=SD[player.name];
      const sg=sd?shotGrade(sd.eff,sd.total):null;
      const rg=rGrade(player.sc.run_secs,player.position);
      html+=`<div class="p-card" onclick="selPlayer('${player.name}')">
        <div class="av" style="background:${p==='Goalkeeper'?'#7c3aed':p==='Inside 3 Defenders'?'#2563eb':p==='Middle 8'?'#1a5c38':'#dc2626'}">${ini(player.name)}</div>
        <div class="p-info">
          <div class="p-name">${player.name}</div>
          <div class="p-pos">${player.games} games${rg?' · '+rg.l+' runner':''}</div>
        </div>
        <div class="p-right">
          ${sd?`<div class="p-eff" style="color:${ec(sd.eff)}">${sd.eff.toFixed(2)}</div><div class="p-effl">${sg?sg.l:'shot eff'}</div>`:'<div class="p-effl" style="margin-top:4px;">No shots</div>'}
        </div>
      </div>`;
    });
  });
  $id('scr-squad').innerHTML=html;
}
function setFilter(f,btn){AF=f;renderSquad();}
function filterSearch(q){
  const cards=document.querySelectorAll('.p-card');
  cards.forEach(c=>{c.style.display=c.textContent.toLowerCase().includes(q.toLowerCase())?'flex':'none';});
}

// ── PLAYER SCREEN ─────────────────────────────────────────────
function selPlayer(name){
  AP=PLAYERS.find(p=>p.name===name);
  $id('scr-squad').classList.remove('active');
  $id('scr-player').classList.add('active');
  ['squad','match','shoot','sc','bench'].forEach(b=>$id('bn-'+b).classList.remove('active'));
  $id('bn-squad').classList.add('active');
  $id('hbk').classList.add('show');
  renderPlayerScreen('overview');
}
function goBack(){
  $id('scr-squad').classList.add('active');
  $id('scr-player').classList.remove('active');
  $id('hbk').classList.remove('show');
  $id('bn-squad').classList.add('active');
}
function showPlayerTab(tab){
  if(!AP){showSquad();return;}
  CT=tab;
  const map={match:'match',shooting:'shoot',sc:'sc',benchmarks:'bench'};
  ['squad','match','shoot','sc','bench'].forEach(b=>$id('bn-'+b).classList.remove('active'));
  if(map[tab]) $id('bn-'+map[tab]).classList.add('active');
  $id('scr-squad').classList.remove('active');
  $id('scr-player').classList.add('active');
  $id('hbk').classList.add('show');
  renderPlayerScreen(tab);
}
function swTab(t,btn){
  CT=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTabBody(t);
}

function renderPlayerScreen(tab){
  dch();
  const p=AP,s=p.sc,sd=SD[p.name];
  const rg=rGrade(s.run_secs,p.position);
  const sg=sd?shotGrade(sd.eff,sd.total):null;
  const posCol=p.position==='Goalkeeper'?'#7c3aed':p.position==='Inside 3 Defenders'?'#2563eb':p.position==='Middle 8'?'#1a5c38':'#dc2626';
  const tabs=['overview','match','shooting','sc','benchmarks'];
  const tabLabels=['Overview','Match','Shooting','S&C','Benchmarks'];
  const tabBar=tabs.map((t,i)=>`<button class="tab${tab===t?' active':''}" onclick="swTab('${t}',this)">${tabLabels[i]}</button>`).join('');
  $id('scr-player').innerHTML=`
    <div class="p-hdr">
      <div class="p-hdr-top">
        <div class="av-lg" style="background:${posCol}40;">${ini(p.name)}</div>
        <div><h2>${p.name}</h2><div class="p-hdr-pos">${p.position} · ${p.games} games</div></div>
      </div>
      <div class="p-pills">
        ${s.weight?`<span class="ppill">${s.weight}kg</span>`:''}
        ${rg?`<span class="ppill" style="background:${rg.bg}40;border-color:${rg.bg}60;">${s.run_time} ${rg.l}</span>`:''}
        ${sg?`<span class="ppill" style="background:${sg.bg}40;border-color:${sg.bg}60;">${sd.eff.toFixed(2)} ${sg.l}</span>`:''}
      </div>
    </div>
    <div class="tab-bar">${tabBar}</div>
    <div id="tb"></div>`;
  renderTabBody(tab);
}

function renderTabBody(tab){
  dch();
  const p=AP,tb=$id('tb');
  if(!tb) return;
  if(tab==='overview') tOver(p,tb);
  else if(tab==='match') tMatch(p,tb);
  else if(tab==='shooting') tShoot(p,tb);
  else if(tab==='sc') tSC(p,tb);
  else if(tab==='benchmarks') tBench(p,tb);
}

// ── TAB: OVERVIEW ─────────────────────────────────────────────

// ── TAB: MATCH ────────────────────────────────────────────────

    return `<div class="card" style="margin-bottom:9px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

        ${sd.tw_att>0?`<span style="font-size:12px;"><span style="color:#14532d;font-weight:700;">${sd.tw_sc}/${sd.tw_att}</span> <span style="color:var(--muted);">2pt</span></span>`:''}
        ${sd.ga_att>0?`<span style="font-size:12px;"><span style="color:#991b1b;font-weight:700;">${sd.ga_sc}/${sd.ga_att}</span> <span style="color:var(--muted);">goals</span></span>`:''}

// ── TAB: SHOOTING ─────────────────────────────────────────────

      <div class="met"><div class="v" style="font-size:18px;color:var(--muted);">${sd.xScore}</div><div class="l">xScore</div></div>

    </div>

    <div class="card">
      <div style="display:flex;gap:6px;margin-bottom:11px;">
        <div style="flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;">
          <div style="font-size:18px;font-weight:700;color:#16a34a;">${sd.pt_scored}/${sd.pt_att}</div>

        </div>
        <div style="flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;">

// ── TAB: S&C ──────────────────────────────────────────────────

  const s=p.sc,rg=rGrade(s.run_secs,p.position);

      <div class="met">${rg?`<div style="background:${rg.bg};color:${rg.tc};border-radius:6px;padding:2px 6px;font-size:10px;font-weight:700;margin-bottom:3px;">${rg.l}</div>`:''}<div class="v" style="font-size:16px;">${s.run_time||'—'}</div><div class="l">1.2km</div></div>
      <div class="met"><div class="v">${s.chin2||s.chin1||'—'}</div><div class="l">Chin Ups</div></div>
    </div>
    <div class="card">
      <div class="ct">Jump Tests (cm) — Test 1 → Test 2</div>
      <div class="cw" style="height:180px;"><canvas id="ch-jmp"></canvas></div>
    </div>
    <div class="card">
      <div class="ct">Broad Jump (cm)</div>
      ${s.broad1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.broad1}cm</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.broad1/320*100,100)}%;background:var(--blue);border-radius:4px;"></div></div></div>`:''}
      ${s.broad2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.broad2}cm</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.broad2/320*100,100)}%;background:#16a34a;border-radius:4px;"></div></div></div>`:''}
      ${s.broad1&&s.broad2?`<div style="font-size:13px;margin-top:3px;color:${s.broad2>s.broad1?'#16a34a':'#dc2626'};font-weight:700;">${s.broad2>s.broad1?'▲ +':'▼ '}${s.broad2-s.broad1}cm</div>`:''}
      ${!s.broad1&&!s.broad2?'<div style="color:var(--light);">No data</div>':''}
    </div>
    ${s.slcmj1||s.slcmj2?`<div class="card"><div class="ct">SLCMJ</div>${s.slcmj1?`<div style="margin-bottom:5px;font-size:13px;">Test 1: <strong>${s.slcmj1}</strong></div>`:''} ${s.slcmj2?`<div style="font-size:13px;">Test 2: <strong>${s.slcmj2}</strong></div>`:''}</div>`:''}
    <div class="card">
      <div class="ct">Bench Press</div>
      ${s.bench1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.bench1}kg</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.bench1/150*100,100)}%;background:var(--blue);border-radius:4px;"></div></div></div>`:''}
      ${s.bench2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.bench2}kg</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.bench2/150*100,100)}%;background:#16a34a;border-radius:4px;"></div></div></div>`:''}
      ${s.bbw?`<div style="font-size:13px;margin-top:4px;">BW Ratio: <strong style="color:${s.bbw>=1.3?'#16a34a':'#ca8a04'}">${s.bbw}</strong> <span style="color:var(--light);">target 1.3× = ${s.btgt}kg</span></div>`:''}
      ${!s.bench1&&!s.bench2?'<div style="color:var(--light);">No data</div>':''}
    </div>
    <div class="card">
      <div class="ct">Front Squat</div>
      ${s.squat1?`<div class="br"><div class="bh"><span>Test 1</span><strong>${s.squat1}kg</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.squat1/180*100,100)}%;background:var(--blue);border-radius:4px;"></div></div></div>`:''}
      ${s.squat2?`<div class="br"><div class="bh"><span>Test 2</span><strong>${s.squat2}kg</strong></div><div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden;"><div style="height:100%;width:${Math.min(s.squat2/180*100,100)}%;background:#16a34a;border-radius:4px;"></div></div></div>`:''}
      ${s.sbw?`<div style="font-size:13px;margin-top:4px;">BW Ratio: <strong style="color:${s.sbw>=1.5?'#16a34a':'#ca8a04'}">${s.sbw}</strong> <span style="color:var(--light);">target 1.5× = ${s.stgt}kg</span></div>`:''}
      ${!s.squat1&&!s.squat2?'<div style="color:var(--light);">No data</div>':''}
    </div>`;
  setTimeout(()=>{
    const ctx=$id('ch-jmp');
    if(ctx){CH['jmp']=new Chart(ctx,{type:'bar',data:{labels:['CMJ','SJ'],datasets:[{label:'Test 1',data:[s.cmj1||0,s.sj1||0],backgroundColor:'#2563eb',borderRadius:5},{label:'Test 2',data:[s.cmj2||0,s.sj2||0],backgroundColor:'#16a34a',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{beginAtZero:true,max:65}},plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});}
  },80);
}

// ── TAB: BENCHMARKS ───────────────────────────────────────────
function tBench(p,tb){
  const s=p.sc,k=pk(p.position),rg=rGrade(s.run_secs,p.position);
  const sd=SD[p.name];
  const sg=sd?shotGrade(sd.eff,sd.total):null;
  const cb=Math.max(s.cmj1||0,s.cmj2||0)||null,sj=Math.max(s.sj1||0,s.sj2||0)||null;
  const bj=Math.max(s.broad1||0,s.broad2||0)||null,ch=Math.max(s.chin1||0,s.chin2||0)||null;
  const SHOT_GRADES=[{l:'Inter County',mn:1.10,mx:1.50,bg:'#14532d',tc:'#fff'},{l:'Senior',mn:1.00,mx:1.09,bg:'#16a34a',tc:'#fff'},{l:'Intermediate',mn:0.85,mx:0.99,bg:'#ca8a04',tc:'#fff'},{l:'Junior',mn:0.75,mx:0.84,bg:'#ea580c',tc:'#fff'},{l:'Junior B',mn:0.50,mx:0.74,bg:'#dc2626',tc:'#fff'}];
  const RUN_GT=p.position==='Middle 8'?RMID:R3UP;
  const metrics=[{l:'CMJ (cm)',v:cb,t:BM['cmj_'+k]},{l:'SJ (cm)',v:sj,t:BM['sj_'+k]},{l:'Broad Jump',v:bj,t:BM['broad_'+k]},{l:'Chin Ups',v:ch,t:BM['chin_'+k]},{l:'Bench/BW',v:s.bbw,t:1.3},{l:'Squat/BW',v:s.sbw,t:1.5}];
  const met=metrics.filter(m=>m.v&&m.v>=m.t).length,tested=metrics.filter(m=>m.v).length;
  const mRows=metrics.map(m=>{
    const ok=m.v&&m.v>=m.t;const col=ok?'#16a34a':m.v?'#ca8a04':'#9ca3af';
    return `<div class="pr"><div class="pl" style="font-size:11px;">${m.l}</div><div class="pt"><div class="pf2" style="width:${m.v?Math.min(m.v/m.t*100,100):0}%;background:${col};"></div></div><div class="pv" style="font-size:11px;color:${col};">${m.v||'—'}</div><div class="ptg">/&nbsp;${m.t}</div></div>`;
  }).join('');
  const effVal = sd ? sd.eff : null;
  tb.innerHTML=`
    <div class="sh2">Shooting Efficiency Grade</div>
    ${sg ? `<div class="grade-card" style="background:${sg.bg};color:${sg.tc};margin-bottom:11px;"><div class="grade-big">${sg.l}</div><div class="grade-sub">Eff ${effVal.toFixed(2)} · ${sd.actual}pts from ${sd.total} shots · xS ${sd.xScore}</div></div>` : `<div style="background:var(--bg);border-radius:var(--r);padding:12px 14px;margin-bottom:11px;color:var(--muted);font-size:13px;">${sd ? `Eff ${effVal.toFixed(2)} — ${sd.total} shots recorded` : 'No shooting data recorded'}</div>`}
    <div class="card" style="margin-bottom:11px;">
      <table class="gtbl">
        <tr><td><span class="gbadge" style="background:#14532d;color:#fff;">Inter County</span></td><td style="color:var(--muted);font-size:12px;">1.10 – 1.50</td><td>${sg&&sg.l==='Inter County'?`<strong style="color:#14532d;">← ${effVal.toFixed(2)}</strong>`:''}</td></tr>
        <tr><td><span class="gbadge" style="background:#16a34a;color:#fff;">Senior</span></td><td style="color:var(--muted);font-size:12px;">1.00 – 1.09</td><td>${sg&&sg.l==='Senior'?`<strong style="color:#16a34a;">← ${effVal.toFixed(2)}</strong>`:''}</td></tr>
        <tr><td><span class="gbadge" style="background:#ca8a04;color:#fff;">Intermediate</span></td><td style="color:var(--muted);font-size:12px;">0.85 – 0.99</td><td>${sg&&sg.l==='Intermediate'?`<strong style="color:#ca8a04;">← ${effVal.toFixed(2)}</strong>`:''}</td></tr>
        <tr><td><span class="gbadge" style="background:#ea580c;color:#fff;">Junior</span></td><td style="color:var(--muted);font-size:12px;">0.75 – 0.84</td><td>${sg&&sg.l==='Junior'?`<strong style="color:#ea580c;">← ${effVal.toFixed(2)}</strong>`:''}</td></tr>
        <tr><td><span class="gbadge" style="background:#dc2626;color:#fff;">Junior B</span></td><td style="color:var(--muted);font-size:12px;">0.50 – 0.74</td><td>${sg&&sg.l==='Junior B'?`<strong style="color:#dc2626;">← ${effVal.toFixed(2)}</strong>`:''}</td></tr>
      </table>
      ${!sd?'<div style="color:var(--light);font-size:12px;padding-top:8px;">No shooting data recorded for this player</div>':''}
    </div>
    <div class="sh2">1.2km Run Grade (${p.position==='Middle 8'?'Middle 3rd':'3 Up/Back'})</div>
    ${rg?`<div class="grade-card" style="background:${rg.bg};color:${rg.tc};"><div class="grade-big">${rg.l}</div><div class="grade-sub">${s.run_time} · ${p.position}</div></div>`:''}
    <div class="card" style="margin-bottom:11px;">
      <table class="gtbl">
        ${RUN_GT.map(g=>{const isc=rg&&rg.l===g.l;const mn=g.mn===0?'Best':`${Math.floor(g.mn/60)}:${String(g.mn%60).padStart(2,'0')}`;const mx=g.mx===9999?'—':`${Math.floor(g.mx/60)}:${String(g.mx%60).padStart(2,'0')}`;return `<tr style="${isc?'font-weight:700;':''}"><td><span class="gbadge" style="background:${g.bg};color:${g.tc};">${g.l}</span></td><td style="font-size:12px;color:var(--muted);">${mn} – ${mx}</td><td>${isc?`<strong style="color:${g.bg};">← ${s.run_time}</strong>`:''}</td></tr>`;}).join('')}
      </table>
      ${!s.run_secs?'<div style="color:var(--light);font-size:12px;padding-top:8px;">No run time recorded</div>':''}
    </div>
    <div class="sh2">S&amp;C Benchmarks</div>
    <div class="g3" style="margin-bottom:11px;">
      <div class="met"><div class="v" style="color:#16a34a;">${met}</div><div class="l">Met</div></div>
      <div class="met"><div class="v" style="color:#ca8a04;">${tested-met}</div><div class="l">Below</div></div>
      <div class="met"><div class="v" style="color:var(--light);">${6-tested}</div><div class="l">Untested</div></div>
    </div>
    <div class="card" style="margin-bottom:11px;">
      <div class="ct">${p.position} — vs Target</div>
      ${mRows}
    </div>
    <div class="card">
      <div class="ct">Radar — vs Position Standard</div>
      <div class="cw" style="height:240px;"><canvas id="ch-rad"></canvas></div>
    </div>`;
  setTimeout(()=>{
    const ctx=$id('ch-rad');
    if(ctx){CH['rad']=new Chart(ctx,{type:'radar',data:{labels:['CMJ','SJ','Broad','Chin','Bench/BW','Squat/BW'],datasets:[{label:'Player',data:[cb?Math.round(cb/BM['cmj_'+k]*100):0,sj?Math.round(sj/BM['sj_'+k]*100):0,bj?Math.round(bj/BM['broad_'+k]*100):0,ch?Math.round(ch/BM['chin_'+k]*100):0,s.bbw?Math.round(s.bbw/1.3*100):0,s.sbw?Math.round(s.sbw/1.5*100):0],fill:true,backgroundColor:'rgba(22,163,74,.15)',borderColor:'#16a34a',pointRadius:4,pointBackgroundColor:'#16a34a'},{label:'Target',data:[100,100,100,100,100,100],fill:false,borderColor:'#ca8a04',borderDash:[5,5],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:130,ticks:{display:false},pointLabels:{font:{size:10}}}},plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11}}}}}});}
  },80);
}

showSquad();
</script>
</body>
</html>
