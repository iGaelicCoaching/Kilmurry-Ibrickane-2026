<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KIB 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --g:#1a5c38;--g2:#2d8a52;--gl:#e5f2ea;--gp:#f0f8f3;
  --red:#dc2626;--amber:#ca8a04;--blue:#2471a3;--orange:#ea580c;
  --bg:#f2f4f6;--card:#fff;--bdr:#e2e5ea;
  --txt:#1a1e21;--muted:#5f6b7a;--light:#9aa3ae;
  --hh:56px;--bnh:64px;--r:12px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;}
.hdr{height:var(--hh);background:var(--g);color:#fff;display:flex;align-items:center;padding:0 16px;gap:11px;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.crest{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--g);flex-shrink:0;}
.ht{font-size:14px;font-weight:700;line-height:1.2;}.hs{font-size:10px;opacity:.7;}
.hbk{margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:none;}
.hbk.show{display:block;}
.screen{position:fixed;top:var(--hh);left:0;right:0;bottom:var(--bnh);overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:12px;}
.screen.active{display:block;}
.bnav{position:fixed;bottom:0;left:0;right:0;height:var(--bnh);background:var(--card);border-top:1px solid var(--bdr);display:flex;z-index:200;box-shadow:0 -1px 6px rgba(0,0,0,.08);}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--light);font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding:6px 2px;transition:color .15s;}
.bni.active{color:var(--g);}.bni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sq-search{background:var(--card);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:8px;}
.sq-search input{flex:1;border:none;outline:none;font-size:15px;background:transparent;color:var(--txt);}
.pf-bar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.pf-bar::-webkit-scrollbar{display:none;}
.pfb{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bdr);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.pfb.active{background:var(--g);color:#fff;border-color:var(--g);}
.p-card{background:var(--card);border-radius:var(--r);padding:13px 14px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;}
.p-card:active{background:var(--gp);}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.p-info{flex:1;min-width:0;}.p-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-pos{font-size:11px;color:var(--muted);margin-top:1px;}.p-right{text-align:right;flex-shrink:0;}
.p-eff{font-size:16px;font-weight:700;}.p-effl{font-size:10px;color:var(--muted);}
.pos-hdr{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);padding:4px 2px 6px;margin-top:6px;display:flex;align-items:center;gap:6px;}
.p-hdr{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%);color:#fff;border-radius:var(--r);padding:16px;margin-bottom:11px;box-shadow:var(--sh);}
.p-hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.av-lg{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden;}
.av-lg img{width:100%;height:100%;object-fit:cover;}
.p-hdr h2{font-size:19px;font-weight:700;line-height:1.1;}.p-hdr-pos{font-size:11px;opacity:.8;margin-top:2px;}
.p-pills{display:flex;gap:6px;flex-wrap:wrap;}
.ppill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:3px 10px;font-size:11px;color:#fff;}
.tab-bar{display:flex;gap:0;margin-bottom:12px;background:var(--card);border-radius:var(--r);padding:3px;box-shadow:var(--sh);overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:6px 11px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);border-radius:8px;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.tab.active{background:var(--g);color:#fff;}
.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);margin-bottom:11px;}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);margin-bottom:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:11px;}
.met{background:var(--card);border-radius:var(--r);padding:12px 8px;box-shadow:var(--sh);text-align:center;}
.met .v{font-size:22px;font-weight:700;line-height:1.1;}.met .l{font-size:10px;color:var(--muted);margin-top:3px;}
.stat-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.stat-row:last-child{border-bottom:none;}
.stat-lbl{font-size:13px;color:var(--muted);flex:1;}.stat-val{font-size:18px;font-weight:700;margin-right:8px;}
.stat-diff{font-size:12px;font-weight:700;padding:2px 7px;border-radius:10px;}
.pr{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.pl{font-size:12px;color:var(--muted);width:88px;flex-shrink:0;}
.pt{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.pf2{height:100%;border-radius:4px;}.pv{font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0;}
.ptg{font-size:11px;color:var(--light);width:38px;text-align:right;flex-shrink:0;}
.gr{padding:11px 0;border-bottom:1px solid var(--bdr);}.gr:last-child{border-bottom:none;}
.gr-opp{font-size:13px;font-weight:700;margin-bottom:5px;}
.gr-stats{display:flex;gap:8px;flex-wrap:wrap;}
.gs{background:var(--bg);border-radius:8px;padding:4px 9px;font-size:12px;color:var(--muted);}
.gs strong{color:var(--txt);}
.sh2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--light);margin:14px 0 8px;}
.grade-card{border-radius:var(--r);padding:14px;text-align:center;margin-bottom:11px;}
.grade-big{font-size:28px;font-weight:800;line-height:1.1;}.grade-sub{font-size:13px;opacity:.85;margin-top:4px;}
.gtbl{width:100%;border-collapse:collapse;font-size:13px;}
.gtbl td{padding:7px 10px;border-bottom:1px solid var(--bdr);}.gtbl tr:last-child td{border-bottom:none;}
.gbadge{display:inline-block;padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;}
.op{display:inline-block;padding:2px 8px;border-radius:9px;font-size:11px;font-weight:600;margin:2px;}
.br{margin-bottom:10px;}.bh{display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px;}
.cw{width:100%;position:relative;}
/* Profile */
.profile-photo-box{width:90px;height:90px;border-radius:50%;background:var(--gl);border:3px solid var(--g);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--g);margin:0 auto 14px;overflow:hidden;}
.profile-photo-box img{width:100%;height:100%;object-fit:cover;}
.info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);gap:10px;}
.info-row:last-child{border-bottom:none;}
.info-lbl{font-size:12px;color:var(--muted);font-weight:600;width:110px;flex-shrink:0;}
.info-val{font-size:13px;color:var(--txt);flex:1;}
/* Notes */
.note-card{background:var(--gl);border-left:3px solid var(--g);border-radius:0 var(--r) var(--r) 0;padding:11px 13px;margin-bottom:8px;}
.note-meta{font-size:10px;color:var(--muted);margin-bottom:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.note-type{color:#fff;border-radius:6px;padding:1px 8px;font-size:10px;font-weight:700;}
.note-body{font-size:13px;color:var(--txt);line-height:1.5;}
/* Injuries */
.inj-card{border-radius:var(--r);padding:12px 13px;margin-bottom:8px;border-left:4px solid;}
.inj-active{background:#fee2e2;border-color:#dc2626;}
.inj-rehab{background:#fef3c7;border-color:#ca8a04;}
.inj-cleared{background:var(--gl);border-color:#16a34a;}
.inj-status{display:inline-block;padding:2px 9px;border-radius:9px;font-size:11px;font-weight:700;margin-bottom:6px;}
.inj-meta{font-size:11px;color:var(--muted);margin-top:5px;}
/* Buttons */
.add-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--g);color:#fff;border:none;border-radius:var(--r);padding:14px;width:100%;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.add-btn-outline{display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:var(--g);border:2px solid var(--g);border-radius:var(--r);padding:12px;width:100%;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;}
/* Setup banner */
.setup-banner{background:#fef3c7;border:1px solid #fde047;border-radius:var(--r);padding:12px 14px;margin-bottom:12px;}
.setup-banner-title{font-size:12px;font-weight:700;color:#92400e;margin-bottom:4px;}
.setup-banner-body{font-size:11px;color:#78350f;line-height:1.6;}
.setup-banner-body strong{color:#92400e;}
/* Loading */
.loading{text-align:center;padding:30px 20px;color:var(--muted);font-size:13px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--bdr);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
.dot.gk{background:#7c3aed;}.dot.def{background:#2563eb;}.dot.mid{background:#1a5c38;}.dot.fwd{background:#dc2626;}
</style>
</head>
<body>
<div class="hdr">
  <div class="crest">KIB</div>
  <div><div class="ht">Kilmurry Ibrickane</div><div class="hs">Senior Football · Season 2026</div></div>
  <button class="hbk" id="hbk" onclick="goBack()">← Back</button>
</div>
<div class="screen active" id="scr-squad"></div>
<div class="screen" id="scr-player"></div>
<div class="bnav">
  <button class="bni active" id="bn-squad" onclick="showSquad()">
    <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    Squad
  </button>
  <button class="bni" id="bn-match" onclick="showPlayerTab('match')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    Match
  </button>
  <button class="bni" id="bn-shoot" onclick="showPlayerTab('shooting')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    Shooting
  </button>
  <button class="bni" id="bn-sc" onclick="showPlayerTab('sc')">
    <svg viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
    S&amp;C
  </button>
  <button class="bni" id="bn-gps" onclick="showPlayerTab('gps')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    GPS
  </button>
  <button class="bni" id="bn-profile" onclick="showPlayerTab('profile')">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </button>
</div>
<script>
// ── GOOGLE SHEETS CONFIG ─────────────────────────────────────
// 1. Create a Google Sheet with 2 tabs named exactly: Notes  and  Injuries
// 2. Notes columns:    Date | Coach | Player | Type | Note
// 3. Injuries columns: Date | Coach | Player | InjuryType | BodyPart | Status | ReturnDate | Notes
// 4. Share the Sheet: File > Share > Publish to web (or share with "Anyone with link can view")
// 5. Copy the Sheet ID from the URL (the long string between /d/ and /edit)
// 6. Paste it below replacing YOUR_GOOGLE_SHEET_ID_HERE
const SHEET_ID = '1w9lBCCvOjjfWG20hp6D44IjuW_XkMOceEmaNaZFhC9s';

async function fetchSheetData(tabName) {
  if (!SHEET_ID || SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') return [];
  // Use CSV export with cache-busting timestamp to always get fresh data
  const ts = Date.now();
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv&sheet=' + encodeURIComponent(tabName) + '&t=' + ts;
  try {
    const res = await fetch(url, {cache: 'no-store'});
    if (!res.ok) return [];
    const text = await res.text();
    const lines = text.trim().split('\n');
    if (lines.length < 2) return [];
    // Parse CSV headers
    const headers = parseCSVLine(lines[0]);
    // Parse data rows
    return lines.slice(1).map(function(line) {
      const vals = parseCSVLine(line);
      const obj = {};
      headers.forEach(function(h, i) {
        obj[h.trim()] = (vals[i] || '').trim();
      });
      return obj;
    }).filter(function(row) {
      return Object.values(row).some(function(v) { return v; });
    });
  } catch(e) {
    return [];
  }
}

function parseCSVLine(line) {
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

async function getPlayerNotes(name) {
  const rows = await fetchSheetData('Notes');
  return rows.filter(r => r['Player'] === name).reverse();
}
async function getPlayerInjuries(name) {
  const rows = await fetchSheetData('Injuries');
  return rows.filter(r => r['Player'] === name).reverse();
}
function openSheetForInput() {
  if (!SHEET_ID || SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') {
    alert('Setup needed\n\nAsk your admin to set up the Google Sheet and paste the Sheet ID into the dashboard.\n\nOnce done, this button opens the input form on your phone.');
    return;
  }
  window.open('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/edit', '_blank');
}

// ── CORE DATA ────────────────────────────────────────────────
const SAVG={tkl:2.37,nto:1.05,ttkl:35.5,tnto:15.75};
const RMID=[{l:'Inter County',mn:0,mx:240,bg:'#14532d',tc:'#fff'},{l:'Senior',mn:241,mx:265,bg:'#16a34a',tc:'#fff'},{l:'Intermediate',mn:266,mx:290,bg:'#ca8a04',tc:'#fff'},{l:'Junior',mn:291,mx:330,bg:'#ea580c',tc:'#fff'},{l:'Junior B',mn:331,mx:9999,bg:'#dc2626',tc:'#fff'}];
const R3UP=[{l:'Inter County',mn:0,mx:250,bg:'#14532d',tc:'#fff'},{l:'Senior',mn:251,mx:270,bg:'#16a34a',tc:'#fff'},{l:'Intermediate',mn:271,mx:300,bg:'#ca8a04',tc:'#fff'},{l:'Junior',mn:301,mx:318,bg:'#ea580c',tc:'#fff'},{l:'Junior B',mn:319,mx:9999,bg:'#dc2626',tc:'#fff'}];
function rGrade(s,pos){if(!s)return null;const t=pos==='Middle 8'?RMID:R3UP;return t.find(g=>s>=g.mn&&s<=g.mx)||t[t.length-1];}
const BM={cmj_gk:32,cmj_def:36,cmj_mid:38,cmj_fwd:38,sj_gk:30,sj_def:34,sj_mid:36,sj_fwd:36,broad_gk:220,broad_def:240,broad_mid:255,broad_fwd:250,chin_gk:8,chin_def:10,chin_mid:12,chin_fwd:10,bench:1.3,squat:1.5};
function pk(pos){return pos==='Goalkeeper'?'gk':pos==='Inside 3 Defenders'?'def':pos==='Middle 8'?'mid':'fwd';}
function ec(e){return e>=1.1?'#14532d':e>=1.0?'#16a34a':e>=0.85?'#ca8a04':e>=0.75?'#ea580c':'#dc2626';}
function el(e){return e>=1.1?'Inter County':e>=1.0?'Senior':e>=0.85?'Intermediate':e>=0.75?'Junior':'Junior B';}
const OC={"Point":"#15803d","2 Point":"#14532d","Goal":"#7f1d1d","Wide":"#b91c1c","Short":"#c2410c","Post":"#92400e","Blocked":"#374151","Saved":"#1d4ed8","45":"#1e40af"};
function opills(o){if(!o||!Object.keys(o).length)return '<span style="color:var(--light);font-size:11px;">None</span>';return Object.entries(o).map(([k,v])=>`<span class="op" style="background:${OC[k]||'#555'};color:#fff;">${k}: ${v}</span>`).join('');}
function shotGrade(e,n){if(e===null||e===undefined||n<3)return null;if(e>=1.10)return{l:'Inter County',bg:'#14532d',tc:'#fff'};if(e>=1.00)return{l:'Senior',bg:'#16a34a',tc:'#fff'};if(e>=0.85)return{l:'Intermediate',bg:'#ca8a04',tc:'#fff'};if(e>=0.75)return{l:'Junior',bg:'#ea580c',tc:'#fff'};if(e>=0.50)return{l:'Junior B',bg:'#dc2626',tc:'#fff'};return null;}
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function dch(){Object.values(CH).forEach(c=>{try{c.destroy();}catch(e){}});CH={};}
function $id(i){return document.getElementById(i);}

// ── SQUAD ────────────────────────────────────────────────────
function showSquad(){

function renderSquad(){
  const pos=['Goalkeeper','Inside 3 Defenders','Middle 8','Inside 3 Forwards'];
  const bp={};PLAYERS.forEach(p=>{(bp[p.position]||(bp[p.position]=[])).push(p);});
  const filt=AF==='All'?null:AF;
  let html=`<div class="sq-search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--light)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="sq-inp" placeholder="Search players…" oninput="filterSearch(this.value)"></div>
  <div class="pf-bar">
    <button class="pfb ${AF==='All'?'active':''}" onclick="setFilter('All',this)">All</button>
    <button class="pfb ${AF==='Goalkeeper'?'active':''}" onclick="setFilter('Goalkeeper',this)">GK</button>
    <button class="pfb ${AF==='Inside 3 Defenders'?'active':''}" onclick="setFilter('Inside 3 Defenders',this)">Defenders</button>
    <button class="pfb ${AF==='Middle 8'?'active':''}" onclick="setFilter('Middle 8',this)">Middle 8</button>
    <button class="pfb ${AF==='Inside 3 Forwards'?'active':''}" onclick="setFilter('Inside 3 Forwards',this)">Forwards</button>
  </div>`;

    const dc=p==='Goalkeeper'?'gk':p==='Inside 3 Defenders'?'def':p==='Middle 8'?'mid':'fwd';
    html+=`<div class="pos-hdr"><span class="dot ${dc}"></span>${{Goalkeeper:'Goalkeepers','Inside 3 Defenders':'Inside 3 Defenders','Middle 8':'Middle 8','Inside 3 Forwards':'Inside 3 Forwards'}[p]}</div>`;
    pl.forEach(player=>{
      const sd=SD[player.name];
      const sg=sd&&sd.total>=3?shotGrade(sd.eff,sd.total):null;
      const rg=rGrade(player.sc.run_secs,player.position);
      html+=`<div class="p-card" onclick="selPlayer('${player.name}')">
        <div class="av" style="background:${posCol(player.position)}">${ini(player.name)}</div>
        <div class="p-info"><div class="p-name">${player.name}</div><div class="p-pos">${player.games} games${rg?' · '+rg.l:''}</div></div>

}

// ── PLAYER NAV ───────────────────────────────────────────────
function selPlayer(name){
  AP=PLAYERS.find(p=>p.name===name);
  $id('scr-squad').classList.remove('active');$id('scr-player').classList.add('active');
  ['squad','match','shoot','sc','gps','profile'].forEach(b=>$id('bn-'+b).classList.remove('active'));
  $id('bn-squad').classList.add('active');$id('hbk').classList.add('show');
  renderPlayerScreen('overview');
}
function goBack(){
  $id('scr-squad').classList.add('active');$id('scr-player').classList.remove('active');
  $id('hbk').classList.remove('show');$id('bn-squad').classList.add('active');
}
function showPlayerTab(tab){
  if(!AP){showSquad();return;}
  CT=tab;
  const map={match:'match',shooting:'shoot',sc:'sc',gps:'gps',profile:'profile'};
  ['squad','match','shoot','sc','gps','profile'].forEach(b=>$id('bn-'+b).classList.remove('active'));
  if(map[tab])$id('bn-'+map[tab]).classList.add('active');
  $id('scr-squad').classList.remove('active');$id('scr-player').classList.add('active');
  $id('hbk').classList.add('show');renderPlayerScreen(tab);
}
function swTab(t,btn){
  CT=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderTabBody(t);
}
function renderPlayerScreen(tab){
  dch();
  const p=AP,s=p.sc,sd=SD[p.name];
  const rg=rGrade(s.run_secs,p.position);
  const sg=sd&&sd.total>=3?shotGrade(sd.eff,sd.total):null;
  const pc=posCol(p.position);
  const tabs=['overview','match','shooting','sc','benchmarks','gps','profile'];
  const tabLabels=['Overview','Match','Shooting','S&C','Benchmarks','GPS','Profile'];
  const tabBar=tabs.map((t,i)=>`<button class="tab${tab===t?' active':''}" onclick="swTab('${t}',this)">${tabLabels[i]}</button>`).join('');
  $id('scr-player').innerHTML=`
    <div class="p-hdr">
      <div class="p-hdr-top">
        <div class="av-lg" style="background:${pc}40;">${ini(p.name)}</div>
        <div><h2>${p.name}</h2><div class="p-hdr-pos">${p.position} · ${p.games} games</div></div>
      </div>
      <div class="p-pills">
        ${s.weight?`<span class="ppill">${s.weight}kg</span>`:''}
        ${rg?`<span class="ppill" style="background:${rg.bg}40;border-color:${rg.bg}60;">${s.run_time} ${rg.l}</span>`:''}
        ${sg?`<span class="ppill" style="background:${sg.bg}40;border-color:${sg.bg}60;">${sd.eff.toFixed(2)} ${sg.l}</span>`:''}
      </div>
    </div>
    <div class="tab-bar">${tabBar}</div>
    <div id="tb"></div>`;
  renderTabBody(tab);
}
function renderTabBody(tab){
  dch();const p=AP,tb=$id('tb');if(!tb)return;
  if(tab==='overview')tOver(p,tb);
  else if(tab==='match')tMatch(p,tb);
  else if(tab==='shooting')tShoot(p,tb);
  else if(tab==='sc')tSC(p,tb);
  else if(tab==='benchmarks')tBench(p,tb);
  else if(tab==='gps')tGPS(p,tb);
  else if(tab==='profile')tProfile(p,tb);
}

        ${g.tw_att>0?`<div class="gs"><span style="color:#14532d;font-weight:700;">${g.tw_sc}/${g.tw_att}</span> 2pt</div>`:''}

      <div class="met"><div class="v">${sd.actual}<span style="font-size:13px;color:var(--muted);"> pts</span></div><div class="l">Scored</div></div>
    </div>
    <div class="g2">
      <div class="met"><div class="v" style="font-size:18px;color:var(--muted);">${sd.xScore}</div><div class="l">xScore</div></div>
      <div class="met"><div class="v" style="color:${ec(sd.eff)};font-size:22px;">${sd.eff.toFixed(2)}</div><div class="l">${sg?sg.l:'Efficiency'}</div></div>
    </div>
    ${sg?`<div style="background:${sg.bg};color:${sg.tc};border-radius:var(--r);padding:12px 16px;text-align:center;margin-bottom:11px;"><div style="font-size:20px;font-weight:800;">${sg.l}</div><div style="font-size:12px;opacity:.85;margin-top:2px;">Eff ${sd.eff.toFixed(2)} · ${sd.actual}pts from ${sd.total} shots</div></div>`:''}

      <div style="display:flex;gap:6px;margin-bottom:11px;">
        <div style="flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;"><div style="font-size:18px;font-weight:700;color:#16a34a;">${sd.pt_scored}/${sd.pt_att}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">1pt · ${ptC}%</div></div>
        <div style="flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;"><div style="font-size:18px;font-weight:700;color:#14532d;">${sd.tw_scored}/${sd.tw_att}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">2pt · ${twC}%</div></div>
        <div style="flex:1;background:var(--bg);border-radius:10px;padding:11px;text-align:center;"><div style="font-size:18px;font-weight:700;color:#991b1b;">${sd.ga_scored}/${sd.ga_att}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;">Goals · ${gaC}%</div></div>
      </div>
      <div class="ct">Outcomes — 1pt</div><div style="margin-bottom:8px;">${opills(sd.pt_out)}</div>
      ${sd.tw_att>0?`<div class="ct">Outcomes — 2pt</div><div style="margin-bottom:8px;">${opills(sd.tw_out)}</div>`:''}
      ${sd.ga_att>0?`<div class="ct">Outcomes — Goals</div><div>${opills(sd.ga_out)}</div>`:''}
    </div>

  setTimeout(()=>{
    const ctx=$id('ch-mix');if(!ctx)return;
    const vd=[{v:sd.pt_att,l:'1pt',c:'#16a34a'},{v:sd.tw_att,l:'2pt',c:'#14532d'},{v:sd.ga_att,l:'Goal',c:'#dc2626'}].filter(x=>x.v>0);
    CH['mix']=new Chart(ctx,{type:'doughnut',data:{labels:vd.map(x=>x.l),datasets:[{data:vd.map(x=>x.v),backgroundColor:vd.map(x=>x.c),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'right',labels:{font:{size:12},boxWidth:14}}}}});
  },80);
}

// ── TAB: BENCHMARKS ──────────────────────────────────────────
function tBench(p,tb){
  const s=p.sc,k=pk(p.position),rg=rGrade(s.run_secs,p.position);
  const sd=SD[p.name];
  const sg=sd&&sd.total>=3?shotGrade(sd.eff,sd.total):null;
  const cb=Math.max(s.cmj1||0,s.cmj2||0)||null,sj=Math.max(s.sj1||0,s.sj2||0)||null;
  const bj=Math.max(s.broad1||0,s.broad2||0)||null,ch=Math.max(s.chin1||0,s.chin2||0)||null;
  const SHOT_GRADES=[{l:'Inter County',mn:1.10,mx:1.50,bg:'#14532d',tc:'#fff'},{l:'Senior',mn:1.00,mx:1.09,bg:'#16a34a',tc:'#fff'},{l:'Intermediate',mn:0.85,mx:0.99,bg:'#ca8a04',tc:'#fff'},{l:'Junior',mn:0.75,mx:0.84,bg:'#ea580c',tc:'#fff'},{l:'Junior B',mn:0.50,mx:0.74,bg:'#dc2626',tc:'#fff'}];
  const RUN_GT=p.position==='Middle 8'?RMID:R3UP;
  const metrics=[{l:'CMJ (cm)',v:cb,t:BM['cmj_'+k]},{l:'SJ (cm)',v:sj,t:BM['sj_'+k]},{l:'Broad Jump',v:bj,t:BM['broad_'+k]},{l:'Chin Ups',v:ch,t:BM['chin_'+k]},{l:'Bench/BW',v:s.bbw,t:1.3},{l:'Squat/BW',v:s.sbw,t:1.5}];
  const met=metrics.filter(m=>m.v&&m.v>=m.t).length,tested=metrics.filter(m=>m.v).length;
  const mRows=metrics.map(m=>{
    const ok=m.v&&m.v>=m.t;const col=ok?'#16a34a':m.v?'#ca8a04':'#9ca3af';
    return `<div class="pr"><div class="pl" style="font-size:11px;">${m.l}</div><div class="pt"><div class="pf2" style="width:${m.v?Math.min(m.v/m.t*100,100):0}%;background:${col};"></div></div><div class="pv" style="font-size:11px;color:${col};">${m.v||'—'}</div><div class="ptg">/ ${m.t}</div></div>`;
  }).join('');
  const sgRow=sg?`<div class="grade-card" style="background:${sg.bg};color:${sg.tc};"><div class="grade-big">${sg.l}</div><div class="grade-sub">Eff ${sd.eff.toFixed(2)} · ${sd.actual}pts from ${sd.total} shots · xS ${sd.xScore}</div></div>`:'<div class="card" style="text-align:center;padding:16px;color:var(--light);">Not enough shots (min 3)</div>';
  const rgRow=rg?`<div class="grade-card" style="background:${rg.bg};color:${rg.tc};"><div class="grade-big">${rg.l}</div><div class="grade-sub">${s.run_time} · ${p.position}</div></div>`:'<div class="card" style="text-align:center;padding:16px;color:var(--light);">No run time recorded</div>';
  const runRows=RUN_GT.map(g=>{
    const isc=rg&&rg.l===g.l;
    const mn=g.mn===0?'Best':`${Math.floor(g.mn/60)}:${String(g.mn%60).padStart(2,'0')}`;
    const mx=g.mx===9999?'—':`${Math.floor(g.mx/60)}:${String(g.mx%60).padStart(2,'0')}`;
    return `<tr style="${isc?'font-weight:700;':''}"><td><span class="gbadge" style="background:${g.bg};color:${g.tc};">${g.l}</span></td><td style="font-size:12px;color:var(--muted);">${mn} – ${mx}</td><td>${isc?`<strong style="color:${g.bg};">← ${s.run_time}</strong>`:''}</td></tr>`;
  }).join('');
  const sgRows=SHOT_GRADES.map(g=>{
    const isc=sg&&sg.l===g.l;
    return `<tr style="${isc?'font-weight:700;':''}"><td><span class="gbadge" style="background:${g.bg};color:${g.tc};">${g.l}</span></td><td style="font-size:12px;color:var(--muted);">${g.mn.toFixed(2)} – ${g.mx.toFixed(2)}</td><td>${isc?`<strong style="color:${g.bg};">← ${sd.eff.toFixed(2)}</strong>`:''}</td></tr>`;
  }).join('');
  tb.innerHTML=`
    <div class="sh2">Shooting Efficiency Grade</div>
    ${sgRow}
    <div class="card" style="margin-bottom:11px;">
      <table class="gtbl">${sgRows}</table>
    </div>
    <div class="sh2">1.2km Run Grade (${p.position==='Middle 8'?'Middle 8':'3 Up/Back'})</div>
    ${rgRow}
    <div class="card" style="margin-bottom:11px;">
      <table class="gtbl">${runRows}</table>
    </div>
    <div class="sh2">S&amp;C Benchmarks</div>
    <div class="g3" style="margin-bottom:11px;">
      <div class="met"><div class="v" style="color:#16a34a;">${met}</div><div class="l">Met</div></div>
      <div class="met"><div class="v" style="color:#ca8a04;">${tested-met}</div><div class="l">Below</div></div>
      <div class="met"><div class="v" style="color:var(--light);">${6-tested}</div><div class="l">Untested</div></div>
    </div>
    <div class="card" style="margin-bottom:11px;">
      <div class="ct">${p.position} — vs Target</div>
      ${mRows}
    </div>
    <div class="card">
      <div class="ct">Radar — vs Position Standard</div>
      <div class="cw" style="height:240px;"><canvas id="ch-rad"></canvas></div>
    </div>`;
  setTimeout(()=>{
    const ctx=$id('ch-rad');
    if(ctx){CH['rad']=new Chart(ctx,{type:'radar',data:{labels:['CMJ','SJ','Broad','Chin','Bench/BW','Squat/BW'],datasets:[{label:'Player',data:[cb?Math.round(cb/BM['cmj_'+k]*100):0,sj?Math.round(sj/BM['sj_'+k]*100):0,bj?Math.round(bj/BM['broad_'+k]*100):0,ch?Math.round(ch/BM['chin_'+k]*100):0,s.bbw?Math.round(s.bbw/1.3*100):0,s.sbw?Math.round(s.sbw/1.5*100):0],fill:true,backgroundColor:'rgba(22,163,74,.15)',borderColor:'#16a34a',pointRadius:4,pointBackgroundColor:'#16a34a'},{label:'Target',data:[100,100,100,100,100,100],fill:false,borderColor:'#ca8a04',borderDash:[5,5],pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:130,ticks:{display:false},pointLabels:{font:{size:10}}}},plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11}}}}}});}
  },80);
}

// ── TAB: GPS ─────────────────────────────────────────────────
function tGPS(p,tb){
  dch();const gd=GPS_DATA[p.name];const gt=GPS_TOTALS[p.name];const sa=GPS_SQUAD_AVG;
  if(!gd||!gt){tb.innerHTML='<div class="card" style="text-align:center;padding:40px 20px;color:var(--muted);">📡<br><br>No GPS data recorded</div>';return;}
  const isMid8=p.position==='Middle 8';
  const tgtDist=isMid8?8500:6500,tgtHSR=Math.round((isMid8?8500:6500)*0.125),tgtSprint=Math.round((isMid8?8500:6500)*0.030),tgtHML=Math.round((isMid8?8500:6500)*0.225);
  const posLabel=isMid8?'Middle 8':'3 Up / Back';
  const avgDist=gt.avg_dist,avgHSR=gt.avg_hsr,avgSprint=gt.avg_sprint,avgHML=gt.avg_hml;
  function badge(val,tgt){const pct=Math.round(val/tgt*100);const col=pct>=100?'#16a34a':pct>=85?'#ca8a04':'#dc2626';return `<span style="background:${col};color:#fff;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;">${pct>=100?'✓':pct>=85?'~':'✗'} ${pct}%</span>`;}
  function pbar(val,tgt){const pct=Math.min(val/tgt*100,100);const col=pct>=100?'#16a34a':pct>=85?'#ca8a04':'#dc2626';return `<div style="height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:${pct}%;background:${col};border-radius:4px;"></div></div>`;}
  function diff(val,sq){const d=val-sq;return `<span style="color:${d>=0?'#16a34a':'#dc2626'};font-size:10px;">${d>=0?'+':''}${d.toLocaleString()}m vs squad</span>`;}
  const gameCards=gd.filter(g=>g.dist>0).map(g=>{
    const dc=g.dist>=tgtDist?'#16a34a':g.dist>=tgtDist*0.85?'#ca8a04':'#dc2626';
    const hc=g.hsr>=tgtHSR?'#16a34a':g.hsr>=tgtHSR*0.85?'#ca8a04':'#dc2626';
    const sc2=g.sprint>=tgtSprint?'#16a34a':g.sprint>=tgtSprint*0.85?'#ca8a04':'#dc2626';
    const mc=g.hml>=tgtHML?'#16a34a':g.hml>=tgtHML*0.85?'#ca8a04':'#dc2626';
    return `<div class="card" style="margin-bottom:9px;"><div style="font-size:14px;font-weight:700;margin-bottom:8px;">v ${g.game}</div>
      <div class="gr-stats">
        <div class="gs"><strong style="color:${dc}">${g.dist.toLocaleString()}</strong>m dist</div>
        <div class="gs"><strong style="color:${hc}">${g.hsr.toLocaleString()}</strong>m HSR</div>
        <div class="gs"><strong style="color:${sc2}">${g.sprint.toLocaleString()}</strong>m sprint</div>
        <div class="gs"><strong style="color:${mc}">${g.hml.toLocaleString()}</strong>m HML</div>
      </div></div>`;
  }).join('');
  tb.innerHTML=`
    <div class="card" style="margin-bottom:10px;background:var(--gl);border:1px solid var(--g);">
      <div style="font-size:12px;font-weight:700;color:var(--g);margin-bottom:6px;">📍 ${posLabel} Targets / Game</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;">
        <span>🏃 Dist: <strong>${tgtDist.toLocaleString()}m</strong></span><span>⚡ HSR: <strong>${tgtHSR.toLocaleString()}m</strong></span>
        <span>💨 Sprint: <strong>${tgtSprint.toLocaleString()}m</strong></span><span>🔥 HML: <strong>${tgtHML.toLocaleString()}m</strong></span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:11px;">
      <div class="met" style="padding:11px 8px;"><div style="font-size:17px;font-weight:700;">${avgDist.toLocaleString()}m</div><div class="l">Avg Distance</div><div style="margin-top:4px;">${badge(avgDist,tgtDist)}</div>${pbar(avgDist,tgtDist)}<div style="margin-top:3px;">${diff(avgDist,sa.dist)}</div></div>
      <div class="met" style="padding:11px 8px;"><div style="font-size:17px;font-weight:700;">${avgHSR.toLocaleString()}m</div><div class="l">Avg HSR</div><div style="margin-top:4px;">${badge(avgHSR,tgtHSR)}</div>${pbar(avgHSR,tgtHSR)}<div style="margin-top:3px;">${diff(avgHSR,sa.hsr)}</div></div>
      <div class="met" style="padding:11px 8px;"><div style="font-size:17px;font-weight:700;">${avgSprint.toLocaleString()}m</div><div class="l">Avg Sprint</div><div style="margin-top:4px;">${badge(avgSprint,tgtSprint)}</div>${pbar(avgSprint,tgtSprint)}<div style="margin-top:3px;">${diff(avgSprint,sa.sprint)}</div></div>
      <div class="met" style="padding:11px 8px;"><div style="font-size:17px;font-weight:700;">${avgHML.toLocaleString()}m</div><div class="l">Avg HML</div><div style="margin-top:4px;">${badge(avgHML,tgtHML)}</div>${pbar(avgHML,tgtHML)}<div style="margin-top:3px;">${diff(avgHML,sa.hml)}</div></div>
    </div>
    <div class="sh2">Game by Game</div>${gameCards}
    <div style="font-size:11px;color:var(--light);margin-top:4px;">${gt.games} game(s) · Squad avg: ${sa.dist.toLocaleString()}m dist · ${sa.hsr.toLocaleString()}m HSR</div>`;
}

// ── TAB: PROFILE ─────────────────────────────────────────────
async function tProfile(p,tb){
  const sd=SD[p.name];const sg=sd&&sd.total>=3?shotGrade(sd.eff,sd.total):null;
  const rg=rGrade(p.sc.run_secs,p.position);
  const isSetup=SHEET_ID==='YOUR_GOOGLE_SHEET_ID_HERE';
  tb.innerHTML=`
    <div class="card">
      <div class="profile-photo-box">${ini(p.name)}</div>
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:19px;font-weight:700;">${p.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${p.position} · Kilmurry Ibrickane · Season 2026</div>
        ${sg?`<div style="display:inline-block;margin-top:8px;background:${sg.bg};color:${sg.tc};border-radius:9px;padding:3px 12px;font-size:12px;font-weight:700;">${sg.l} Shooter</div>`:''}
      </div>
      <div class="info-row"><div class="info-lbl">Position</div><div class="info-val">${p.position}</div></div>
      <div class="info-row"><div class="info-lbl">Games Played</div><div class="info-val">${p.games} <span style="color:var(--muted);font-size:12px;">(Season 2026)</span></div></div>
      <div class="info-row"><div class="info-lbl">Weight</div><div class="info-val">${p.sc.weight?p.sc.weight+'kg':'Not recorded'}</div></div>
      <div class="info-row"><div class="info-lbl">1.2km Run</div><div class="info-val">${p.sc.run_time?p.sc.run_time+' <span style="color:var(--muted);font-size:12px;">'+(rg?'— '+rg.l:'')+'</span>':'Not recorded'}</div></div>
      <div class="info-row"><div class="info-lbl">Shooting Eff</div><div class="info-val">${sd&&sd.total>=3?`<span style="color:${ec(sd.eff)};font-weight:700;">${sd.eff.toFixed(2)}</span> <span style="color:var(--muted);font-size:12px;">(${sd.total} shots)</span>`:'Not enough shots'}</div></div>
    </div>
    ${isSetup?`<div class="setup-banner">
      <div class="setup-banner-title">⚙️ Google Sheets Setup Required</div>
      <div class="setup-banner-body">
        To enable live coaching notes and injury tracking:<br><br>
        <strong>1.</strong> Create a Google Sheet with 2 tabs: <strong>Notes</strong> and <strong>Injuries</strong><br>
        <strong>2.</strong> Notes columns: Date · Coach · Player · Type · Note<br>
        <strong>3.</strong> Injuries columns: Date · Coach · Player · InjuryType · BodyPart · Status · ReturnDate · Notes<br>
        <strong>4.</strong> File → Share → Publish to web (or Anyone with link can view)<br>
        <strong>5.</strong> Copy the Sheet ID from the URL and paste it into the dashboard
      </div>
    </div>`:''}
    <div class="sh2" style="display:flex;align-items:center;justify-content:space-between;">Coaching Notes &amp; 1-1 Log<button onclick="tProfile(AP,$id('tb'))" style="background:none;border:none;color:var(--g);font-size:11px;font-weight:700;cursor:pointer;padding:0;">↻ Refresh</button></div>
    <button class="add-btn" onclick="openSheetForInput()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Add Note / Log 1-1 Meeting
    </button>
    <div id="notes-area"><div class="loading"><div class="spinner"></div><br>Loading notes…</div></div>
    <div class="sh2" style="margin-top:16px;">Injury Tracker</div>
    <button class="add-btn-outline" onclick="openSheetForInput()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Log Injury / Update Status
    </button>
    <div id="injuries-area"><div class="loading"><div class="spinner"></div><br>Loading injury history…</div></div>`;

  // Load notes async
  const notes=await getPlayerNotes(p.name);
  const na=$id('notes-area');
  if(na){
    if(!notes.length){
      const hasError=notes[0]&&notes[0]._error;
      if(hasError){
        const msg=notes[0]._error;
        na.innerHTML=`<div class="setup-banner"><div class="setup-banner-title">⚠️ Debug Info</div><div class="setup-banner-body">Error: ${msg}<br><br>Sheet ID: ${SHEET_ID}<br><br>Check browser console (F12) for details.</div></div>`;
      } else {
        na.innerHTML=`<div class="card" style="text-align:center;padding:20px;color:var(--light);">No coaching notes recorded yet.<br><span style="font-size:11px;">Add notes via the button above.</span></div>`;
      }
    }else{
      const typeColors={'1-1 Meeting':'#1a5c38','Training Obs':'#2471a3','Match Obs':'#7c3aed','Welfare':'#ca8a04','Fitness':'#ea580c','General':'#5f6b7a'};
      na.innerHTML=notes.map(n=>{
        const tc=typeColors[n['Type']]||'#5f6b7a';
        return `<div class="note-card">
          <div class="note-meta">
            <span class="note-type" style="background:${tc};">${n['Type']||'Note'}</span>
            <span>${n['Date']||''}</span>
            ${n['Coach']?`<span>· ${n['Coach']}</span>`:''}
          </div>
          <div class="note-body">${n['Note']||''}</div>
        </div>`;
      }).join('');
    }
  }

  // Load injuries async
  const injuries=await getPlayerInjuries(p.name);
  const ia=$id('injuries-area');
  if(ia){
    if(!injuries.length){
      const injError=injuries[0]&&injuries[0]._error;
      if(!injError){
        ia.innerHTML=`<div class="card" style="text-align:center;padding:20px;color:var(--light);">No injury history recorded.<br><span style="font-size:11px;">Log injuries via the button above.</span></div>`;
      } else {
        ia.innerHTML='';
      }
    }else{
      const statusClass={'Active':'inj-active','Rehab':'inj-rehab','Cleared':'inj-cleared'};
      const statusCol={'Active':'#991b1b','Rehab':'#92400e','Cleared':'#15803d'};
      ia.innerHTML=injuries.map(inj=>{
        const s2=inj['Status']||'Unknown';
        const sc=statusClass[s2]||'inj-cleared';
        const col=statusCol[s2]||'#5f6b7a';
        return `<div class="inj-card ${sc}">
          <span class="inj-status" style="background:${col}20;color:${col};border:1px solid ${col}40;">${s2}</span>
          <div style="font-size:14px;font-weight:700;">${inj['Injury Type']||'Injury'}</div>
          <div class="inj-meta">
            Logged: ${inj['Date']||''}
            ${inj['Return Date']?` · Est. return: <strong>${inj['Return Date']}</strong>`:''}
          </div>
          ${inj['Notes']?`<div style="font-size:12px;color:var(--txt);margin-top:6px;line-height:1.5;">${inj['Notes']}</div>`:''}
        </div>`;
      }).join('');
    }
  }
}

showSquad();
</script>
</body>
</html>
